<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuro Learn AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
  
  body {
    background: linear-gradient(-45deg, #0f172a, #1e293b, #020617);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: white;
    overflow-x: hidden;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 25px; background: #020617; position: sticky; top: 0; z-index: 1000;
    border-bottom: 1px solid #1e293b;
  }
  
  nav h1 { color: #38bdf8; font-size: 28px; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
  nav button { background: #38bdf8; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; color: #020617; }

  .hero { text-align: center; padding: 30px 10px 10px; }
  .hero h2 { font-size: 26px; margin-bottom: 8px; color: #38bdf8; }

  .exam-wish {
    text-align: center; color: #4ade80; font-size: 14px; font-weight: bold;
    margin: 15px 0; text-shadow: 0 0 8px rgba(74, 222, 128, 0.3);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px 10px; padding: 20px; max-width: 600px; margin: 0 auto; }
  .card { 
    background: #1e293b; padding: 12px; border-radius: 12px; border: 1px solid #334155; 
    cursor: pointer; text-align: center; font-size: 13px; transition: 0.3s; 
    box-shadow: 0 4px 6px rgba(0,0,0,0.3); white-space: nowrap; 
  }
  .card:hover { border-color: #38bdf8; transform: translateY(-3px); box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }

  .chatBox {
    background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px);
    margin: 20px; border-radius: 24px; padding: 15px;
    display: flex; flex-direction: column; border-top: 3px solid #38bdf8;
    box-shadow: 0 8px 32px rgba(0,0,0,0.8); max-height: 450px;
  }

  #chat { height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px; scroll-behavior: smooth; }
  .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 14px; line-height: 1.4; }
  .user { background: #1e293b; align-self: flex-end; color: #60a5fa; border-bottom-right-radius: 2px; }
  .bot { background: #020617; align-self: flex-start; color: #4ade80; border-left: 4px solid #38bdf8; border-bottom-left-radius: 2px; }

  .input-area { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; padding-top: 15px; border-top: 2px solid #38bdf8; }
  .action-row { display: flex; gap: 10px; position: relative; }
  input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #020617; color: white; outline: none; font-size: 16px; }
  
  .sendBtn { flex: 2; background: #38bdf8; color: #020617; font-weight: bold; padding: 12px; border-radius: 12px; border: none; cursor: pointer; }
  .micBtn { flex: 1; background: #1e293b; color: #38bdf8; border: 1px solid #38bdf8; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 18px; transition: 0.3s; }
   </style>
   <style>
  

  #pause-btn {
    display: none; position: absolute; right: 5px; top: -50px;
    background: #ef4444; border: none; width: 40px; height: 40px;
    border-radius: 50%; cursor: pointer; align-items: center; justify-content: center;
    box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); z-index: 10;
  }
  .square { width: 12px; height: 12px; background: white; border-radius: 2px; }

  footer { text-align: center; padding: 30px; opacity: 0.7; font-size: 13px; color: #38bdf8; }
  footer p { margin-top: 5px; font-size: 11px; opacity: 0.5; color: white; }
</style>
</head>
<body>

<nav>
  <h1><span>🧠</span> Neuro Learn</h1>
  <button onclick="location.reload()">Reset</button>
</nav>

<div class="exam-wish">✨ May you get full marks in your exam! ✨</div>

<section class="hero">
  <h2>Learning Assistant</h2>
  <p style="opacity: 0.6; font-size: 15px;">Advanced AI Learning Environment</p>
</section>

<div class="grid">
  <div class="card" onclick="quick('Math')">📊 Math</div>
  <div class="card" onclick="quick('Physics')">⚡ Physics</div>
  <div class="card" onclick="quick('Chemistry')">🧪 Chemistry</div>
  <div class="card" onclick="quick('English')">📖 English</div>
  <div class="card" onclick="quick('Computer')">💻 Computer</div>
  <div class="card" onclick="quick('Science')">🔬 Science</div>
</div>

<div class="chatBox">
  <div id="chat"><div class="msg bot">🧠 AI: Hello! Ready to Learn?</div></div>
  <div class="input-area">
    <div class="action-row">
        <input type="text" id="input" placeholder="Type here..." onkeypress="if(event.key==='Enter') send()">
        <button class="micBtn" id="micBtn" onclick="startVoice()">🎤</button>
        <button id="pause-btn"><div class="square"></div></button>
        <button class="sendBtn" onclick="send()">Send</button>
    </div>
  </div>
</div>

<footer>
    <strong>©Neuro Learn AI | Hexamemol</strong>
    
</footer>

<script src="config.js"></script>
<script src="pause-handler.js"></script>

<script>
const micBtn = document.getElementById('micBtn');
const inputEl = document.getElementById('input');
function startVoice() {
    // Browser compatibility check
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        alert("Aapka browser voice recognition support nahi karta. Please Google Chrome istemal karein.");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US'; // Aap isay 'ur-PK' bhi kar sakte hain agar Urdu bolni ho
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
        micBtn.innerText = "🛑"; // Recording start hone par stop ka nishan
        micBtn.style.boxShadow = "0 0 15px #ef4444"; // Red glow effect
    };

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        inputEl.value = transcript;
        // Optional: Bolne ke foran baad message send karne ke liye niche wali line uncomment kar dein
        // send(); 
    };

    recognition.onerror = (event) => {
        console.error("Speech error:", event.error);
        micBtn.innerText = "🎤";
        micBtn.style.boxShadow = "none";
    };

    recognition.onend = () => {
        micBtn.innerText = "🎤";
        micBtn.style.boxShadow = "none";
    };

    try {
        recognition.start();
    } catch (err) {
        console.log("Recognition already started or blocked");
    }
}



async function typewriter(element, text, signal) {
    element.innerHTML = "🧠 AI: "; 
    const words = text.split(/\s+/);
    for (let i = 0; i < words.length; i++) {
        if (signal && signal.aborted) break;
        element.innerHTML += words[i] + " "; 
        const chat = document.getElementById("chat");
        chat.scrollTop = chat.scrollHeight;
        await new Promise(r => setTimeout(r, 45)); 
    }
}

async function send() {
  const chat = document.getElementById("chat");
  const val = inputEl.value.trim();
  const pauseBtn = document.getElementById('pause-btn');
  
  let signal = null;
  if (typeof initializeAIStream === 'function') { signal = initializeAIStream(); }

  if (!val || typeof MY_GROQ_KEY === 'undefined') return;

  chat.innerHTML += `<div class="msg user">👤 You: ${val}</div>`;
  inputEl.value = "";
  if(pauseBtn) pauseBtn.style.display = 'flex';

  const thinkingId = "think-" + Date.now();
  chat.innerHTML += `<div class="msg bot" id="${thinkingId}">🧠 AI: <span id="status-${thinkingId}">Thinking...</span></div>`;
  const botMsg = document.getElementById(thinkingId);
  const statusSpan = document.getElementById(`status-${thinkingId}`);
  chat.scrollTop = chat.scrollHeight;

  try {
    // REMOVED "Connecting to Hexamemol" text
    await new Promise(r => setTimeout(r, 600)); 
    if (statusSpan) statusSpan.innerText = "Accessing knowledge base...";
    await new Promise(r => setTimeout(r, 800));
    if (statusSpan) statusSpan.innerText = "Processing response...";
    await new Promise(r => setTimeout(r, 400));

    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: { "Authorization": `Bearer ${MY_GROQ_KEY}`, "Content-Type": "application/json" },
      signal: signal,
      body: JSON.stringify({
        model: "llama-3.1-8b-instant",
        messages: [
            { 
              role: "system", 
              content: `You are Neuro Learn AI, a helpful academic assistant developed by Bilal Haider (Hexamemol AI Corporation). 
- Only mention your identity or developer if the user specifically asks for it. 
- Otherwise, focus on answering the user's academic questions.
- Keep all answers under 4 lines.`
 `You are Neuro Learn AI.
            }, 
            { role: "user", content: val }
        ]
      })
    });

    const data = await response.json();
    const aiResult = data.choices[0].message.content;
    await typewriter(botMsg, aiResult, signal);

  } catch (e) {
    if (e.name === 'AbortError') {
      botMsg.innerHTML += " <span style='color:#ef4444; font-weight:bold;'>[STOPPED]</span>";
    }
  } finally {
    if(pauseBtn) pauseBtn.style.display = 'none';
  }
}

function quick(t) { inputEl.value = "Explain " + t + " basics."; send(); }
</script>
</body>
</html>
